[build]
  publish = "."

[[redirects]]
  from = "/CubPrep/*"
  to = "/CubPrep/:splat"
  status = 200

[[redirects]]
  from = "/SAA-C03/*"
  to = "/SAA-C03/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
